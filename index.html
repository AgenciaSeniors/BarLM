<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bar LM | Menú Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- ═══ HERO ═══ -->
<header class="hero">
    <div class="hero-corner hero-corner--tl"><svg viewBox="0 0 24 24" fill="none"><path d="M2 2h8M2 2v8" stroke="#d946ef" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    <div class="hero-corner hero-corner--tr"><svg viewBox="0 0 24 24" fill="none"><path d="M2 2h8M2 2v8" stroke="#d946ef" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    <div class="hero-corner hero-corner--bl"><svg viewBox="0 0 24 24" fill="none"><path d="M2 2h8M2 2v8" stroke="#d946ef" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    <div class="hero-corner hero-corner--br"><svg viewBox="0 0 24 24" fill="none"><path d="M2 2h8M2 2v8" stroke="#d946ef" stroke-width="1.5" stroke-linecap="round"/></svg></div>

    <div class="hero-content">
        <img class="crown-logo" src="logo.png" alt="Bar LM Logo">
        <h1 class="brand-name">BAR LM</h1>
        <div style="margin-top: 18px;"><div class="neon-line"></div></div>
        <p class="hero-quote">"Café para sobrevivir al día.<br>Tequila para sobrevivir a la noche."</p>
    </div>
</header>

<!-- ═══ SEARCH ═══ -->
<div class="search-wrapper">
    <div class="search-box">
        <span class="search-icon">◆</span>
        <input type="text" id="search-input" placeholder="Buscar en el menú...">
    </div>
</div>

<!-- ═══ FILTERS ═══ -->
<div class="filters-container">
    <nav class="filters" id="filters-nav">
        <button class="filter-btn active" data-cat="inicio">🏠 Inicio</button>
        <button class="filter-btn" data-cat="cafes_calientes">☕ Cafés Calientes</button>
        <button class="filter-btn" data-cat="cafes_frios">🧊 Cafés Fríos</button>
        <button class="filter-btn" data-cat="cocteles_sin_alcohol">🍹 Sin Alcohol</button>
        <button class="filter-btn" data-cat="cocteles_con_alcohol">🍸 Con Alcohol</button>
        <button class="filter-btn" data-cat="cocteles_vodka">🍷 Vodka</button>
        <button class="filter-btn" data-cat="cocteles_cerveza">🍺 Cerveza</button>
        <button class="filter-btn" data-cat="cocteles_vino">🍷 Vino</button>
        <button class="filter-btn" data-cat="cocteles_ginebra">🫒 Ginebra</button>
        <button class="filter-btn" data-cat="cocteles_tequila">🌵 Tequila</button>
        <button class="filter-btn" data-cat="cocteles_whisky">🥃 Whisky</button>
        <button class="filter-btn" data-cat="entrantes">🍟 Entrantes</button>
        <button class="filter-btn" data-cat="hamburguesas">🍔 Hamburguesas</button>
        <button class="filter-btn" data-cat="entremes">🧀 Entremés</button>
        <button class="filter-btn" data-cat="tacos">🌮 Tacos</button>
        <button class="filter-btn" data-cat="pizzas">🍕 Pizzas</button>
        <button class="filter-btn" data-cat="cervezas">🍺 Cervezas</button>
        <button class="filter-btn" data-cat="vinos">🍷 Vinos</button>
        <button class="filter-btn" data-cat="refrescantes">🥤 Refrescantes</button>
        <button class="filter-btn" data-cat="otras_bebidas">🥃 Otras Bebidas</button>
    </nav>
</div>

<!-- ═══ MENU GRID ═══ -->
<main class="container">
    <h3 class="section-title">Nuestra Carta</h3>
    <div id="menu-grid"></div>
</main>

<!-- ═══ DETAIL MODAL ═══ -->
<div id="modal-detalle" class="modal-overlay" onclick="if(event.target===this)cerrarDetalle()">
    <div class="modal-card">
        <button class="modal-close" onclick="cerrarDetalle()">✕</button>
        <img id="det-img" src="" alt="" class="modal-img">
        <div class="modal-info">
            <div class="modal-header-row">
                <h2 id="det-titulo" class="modal-title"></h2>
                <div id="det-price" class="modal-price"></div>
            </div>
            <p id="det-desc" class="modal-desc"></p>
            <div class="modal-rating-box" onclick="abrirListaOpiniones()">
                <div class="rating-row">
                    <span class="rating-label">Valoración:</span>
                    <span class="rating-stars">★ <span id="det-rating">0.0</span></span>
                </div>
                <div class="rating-link">(Ver reseñas) <span id="det-reviews-count"></span></div>
            </div>
            <button class="btn-opinion" onclick="abrirOpinion()">DEJAR OPINIÓN</button>
        </div>
    </div>
</div>

<!-- ═══ OPINION MODAL ═══ -->
<div id="modal-opinion" class="modal-opinion-overlay" onclick="if(event.target===this)cerrarOpinion()">
    <div class="modal-opinion-card">
        <h3 class="opinion-title">Calificar Experiencia</h3>
        <div class="stars-container" id="stars-container">
            <span data-val="1">★</span><span data-val="2">★</span><span data-val="3">★</span><span data-val="4">★</span><span data-val="5">★</span>
        </div>
        <input type="text" id="op-nombre" class="input-lm" placeholder="Tu nombre (Opcional)">
        <textarea id="op-comentario" class="input-lm" placeholder="¿Qué te pareció?"></textarea>
        <button class="btn-enviar" id="btn-enviar" onclick="enviarOpinion()">ENVIAR</button>
    </div>
</div>

<!-- ═══ REVIEWS LIST MODAL ═══ -->
<div id="modal-reviews" class="modal-opinion-overlay" onclick="if(event.target===this)cerrarReviews()">
    <div class="modal-opinion-card" style="max-height:70vh; overflow-y:auto; text-align:left;">
        <h3 class="opinion-title" style="text-align:center;">Opiniones de clientes</h3>
        <div id="reviews-list"></div>
    </div>
</div>

<!-- ═══ FAB VOLVER ARRIBA ═══ -->
<button id="fab-top" class="fab-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- ═══ FOOTER ═══ -->
<footer>
    <p class="footer-brand">BAR LM © 2026</p>
    <p class="footer-agency">Digital Experience by <a href="https://agenciaseniors.com" target="_blank">AGENCY SENIORS</a></p>
    <a href="login.html" class="footer-admin">Acceso Gerencial</a>
</footer>

<script src="script.js"></script>
</body>
</html>
