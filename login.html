<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bar LM | Acceso Gerencial</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
</head>
<body class="login-body">

<div class="login-container">
    <div class="login-card">
        <img class="login-logo" src="logo.png" alt="Bar LM">
        <h1 class="login-title">Acceso Gerencial</h1>
        <div class="neon-line" style="margin: 0 auto 28px;"></div>

        <form id="login-form" onsubmit="return iniciarSesion(event)">
            <input type="email" id="login-email" class="input-lm" placeholder="Correo electrónico" required autocomplete="email">
            <input type="password" id="login-pass" class="input-lm" placeholder="Contraseña" required autocomplete="current-password">
            <p id="login-error" class="login-error"></p>
            <button type="submit" class="btn-login" id="btn-login">INGRESAR</button>
        </form>

        <a href="index.html" class="login-back">← Volver al Menú</a>
    </div>
</div>

<script>
async function iniciarSesion(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const errorMsg = document.getElementById('login-error');
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-pass').value;

    btn.disabled = true;
    btn.textContent = 'Verificando...';
    errorMsg.textContent = '';

    try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
            errorMsg.textContent = 'Credenciales inválidas. Intente de nuevo.';
            btn.disabled = false;
            btn.textContent = 'INGRESAR';
            return;
        }

        window.location.href = 'admin.html';
    } catch (err) {
        errorMsg.textContent = 'Error de conexión. Intente más tarde.';
        btn.disabled = false;
        btn.textContent = 'INGRESAR';
    }
}

// Si ya tiene sesion, redirigir directo
(async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) window.location.href = 'admin.html';
})();
</script>

</body>
</html>
